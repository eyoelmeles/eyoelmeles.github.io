<!-- layouts/shortcodes/card.html -->
{{- define "shortcode_card" -}}
  <div class="card shadow mb-3">
    <div class="card-body p-3 bg-{{ index .Params 0 }} text-white rounded-top">
      <h5 class="mb-0">{{ .Get "title" }}</h5>
    </div>
    <div class="card-body pt-0 pb-2 px-3">
      {{ .Inner | safeHTML }}
    </div>
  </div>
{{- end -}}
